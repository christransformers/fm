<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUSE Music — Underground Discovery Platform</title>
<meta name="description" content="FUSE Music — The underground. Amplified.">
<meta property="og:title" content="FUSE Music">
<meta property="og:description" content="Underground music discovery. Apply for early access.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://fusemusic.com.au">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3B5;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== CSS RESET & DESIGN TOKENS ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #0a0a0b;
  --bg-elevated: #111114;
  --bg-surface: rgba(255,255,255,0.03);
  --bg-surface-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --border-glow: rgba(255,107,53,0.2);
  --text-primary: #e8e8ec;
  --text-secondary: #9a9aa3;
  --text-muted: #5c5c66;
  --accent: #ff6b35;
  --accent-glow: rgba(255,107,53,0.3);
  --accent-dim: rgba(255,107,53,0.1);
  --secondary: #4dabf7;
  --secondary-glow: rgba(77,171,247,0.2);
  --purple: #b388ff;
  --success: #69db7c;
  --danger: #ff6b6b;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --transition-slow: 0.4s cubic-bezier(0.4,0,0.2,1);
  --shadow-glow: 0 0 40px var(--accent-glow);
  --shadow-card: 0 2px 20px rgba(0,0,0,0.3);
  --header-h: 64px;
  --player-h: 80px;
  --player-mini-h: 56px;
}
[data-theme="light"]{
  --bg: #f8f8fa;
  --bg-elevated: #ffffff;
  --bg-surface: rgba(0,0,0,0.03);
  --bg-surface-hover: rgba(0,0,0,0.06);
  --border: rgba(0,0,0,0.08);
  --text-primary: #1a1a1f;
  --text-secondary: #5c5c66;
  --text-muted: #9a9aa3;
}
@media(prefers-color-scheme:light){[data-theme="auto"]{
  --bg: #f8f8fa;--bg-elevated:#fff;--bg-surface:rgba(0,0,0,0.03);
  --bg-surface-hover:rgba(0,0,0,0.06);--border:rgba(0,0,0,0.08);
  --text-primary:#1a1a1f;--text-secondary:#5c5c66;--text-muted:#9a9aa3;
}}

html{scroll-behavior:smooth;font-size:16px;background:var(--bg);color:var(--text-primary)}
body{font-family:system-ui,-apple-system,sans-serif;line-height:1.6;min-height:100vh;
  display:flex;flex-direction:column;overflow-x:hidden;
  background:radial-gradient(ellipse at 20% 20%, rgba(255,107,53,0.04) 0%, transparent 50%),
             radial-gradient(ellipse at 80% 60%, rgba(77,171,247,0.04) 0%, transparent 50%),
             radial-gradient(ellipse at 50% 80%, rgba(179,136,255,0.03) 0%, transparent 50%),
             var(--bg);
}

/* ===== TYPOGRAPHY ===== */
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;letter-spacing:-0.02em;text-wrap:balance}
h1{font-size:clamp(2rem,6vw,4.5rem);line-height:1.05}
h2{font-size:clamp(1.5rem,4vw,2.5rem);line-height:1.15}
h3{font-size:clamp(1.1rem,3vw,1.5rem);line-height:1.25}
.gradient-text{background:linear-gradient(135deg,var(--accent),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ===== HEADER / NAV ===== */
#app-header{position:sticky;top:0;z-index:100;height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1rem,4vw,2rem);
  background:rgba(10,10,11,0.85);backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);}
#app-header .logo{font-family:var(--font-display);font-size:1.4rem;font-weight:800;
  letter-spacing:-0.04em;cursor:pointer;display:flex;align-items:center;gap:8px}
#app-header .logo span{color:var(--accent)}
#app-header .logo .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
  animation:pulse-dot 2s ease-in-out infinite;box-shadow:0 0 12px var(--accent-glow)}
#app-header nav{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
#app-header nav a{color:var(--text-secondary);text-decoration:none;padding:8px 14px;
  border-radius:var(--radius-sm);transition:var(--transition);font-size:0.875rem;
  font-weight:500;white-space:nowrap}
#app-header nav a:hover,#app-header nav a.active{color:var(--text-primary);background:var(--bg-surface)}
#app-header nav a.active{color:var(--accent)}
.theme-toggle,.menu-toggle{background:none;border:none;color:var(--text-secondary);
  cursor:pointer;font-size:1.2rem;padding:8px;border-radius:var(--radius-sm);
  transition:var(--transition)}
.theme-toggle:hover{color:var(--accent);background:var(--bg-surface)}
.menu-toggle{display:none}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== LAYOUT ===== */
#app-main{flex:1;padding-bottom:calc(var(--player-h) + 32px);max-width:1440px;
  width:100%;margin:0 auto;padding-left:clamp(1rem,4vw,2rem);padding-right:clamp(1rem,4vw,2rem)}
#app-main > section{padding:48px 0}
#app-main > section:first-child{padding-top:32px}

/* ===== SIDEBAR (A&R Ticker #24) ===== */
.layout-with-sidebar{display:grid;grid-template-columns:1fr 280px;gap:32px}
.ar-ticker{position:sticky;top:calc(var(--header-h) + 24px);align-self:start;
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;max-height:480px;overflow:hidden}
.ar-ticker h4{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--accent);margin-bottom:16px;font-family:var(--font-display)}
.ar-ticker .ticker-item{padding:10px 0;border-bottom:1px solid var(--border);
  font-size:0.8rem;color:var(--text-secondary);animation:fadeInUp 0.4s ease}
.ar-ticker .ticker-item .label{color:var(--accent);font-weight:600;font-size:0.7rem;
  text-transform:uppercase;letter-spacing:0.05em}
.ar-ticker .ticker-item .time{color:var(--text-muted);font-size:0.65rem;margin-top:4px;
  font-family:var(--font-mono)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== CARDS ===== */
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:20px;transition:var(--transition);cursor:pointer;position:relative;overflow:hidden}
.card:hover{background:var(--bg-surface-hover);border-color:var(--border-glow);
  transform:translateY(-2px);box-shadow:var(--shadow-card)}
.track-card{display:flex;align-items:center;gap:14px;padding:12px 16px}
.track-card .art{width:48px;height:48px;border-radius:var(--radius-sm);object-fit:cover;
  flex-shrink:0;background:var(--bg-elevated)}
.track-card .info{flex:1;min-width:0}
.track-card .title{font-weight:600;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-display)}
.track-card .artist{font-size:0.8rem;color:var(--text-secondary)}
.track-card .meta{display:flex;align-items:center;gap:8px;margin-top:2px}
.track-card .genre-tag{font-size:0.65rem;padding:2px 8px;border-radius:100px;
  background:var(--accent-dim);color:var(--accent);font-weight:500;
  text-transform:uppercase;letter-spacing:0.05em}
.track-card .plays{font-size:0.7rem;color:var(--text-muted);font-family:var(--font-mono)}
.track-card .waveform{flex-shrink:0;width:80px;height:28px;opacity:0.4;
  transition:var(--transition)}
.track-card:hover .waveform{opacity:0.8}
.track-card .play-btn{width:36px;height:36px;border-radius:50%;border:none;
  background:var(--bg-surface-hover);color:var(--text-primary);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:var(--transition);
  flex-shrink:0;font-size:0.9rem}
.track-card:hover .play-btn{background:var(--accent);color:#fff}
.track-card.playing .play-btn{background:var(--accent);color:#fff}

/* ===== ARTIST CARD ===== */
.artist-card{text-align:center;padding:24px 16px}
.artist-card .avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;
  margin-bottom:12px;border:2px solid var(--border);transition:var(--transition)}
.artist-card:hover .avatar{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.artist-card .name{font-family:var(--font-display);font-weight:700;font-size:1.05rem}
.artist-card .genre{font-size:0.75rem;color:var(--accent);text-transform:uppercase;
  letter-spacing:0.1em;margin-top:2px}
.artist-card .badge-row{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.artist-card .badge{font-size:0.6rem;padding:3px 8px;border-radius:100px;
  background:var(--accent-dim);color:var(--accent);font-weight:600;
  text-transform:uppercase;letter-spacing:0.05em}
.artist-card .badge.gold{background:rgba(255,215,0,0.15);color:#ffd700;
  animation:gold-pulse 2s ease-in-out infinite}
.artist-card .verified{display:inline-flex;align-items:center;gap:4px}
.artist-card .verified::after{content:'â';color:var(--secondary);font-size:0.7rem;
  background:var(--secondary-glow);width:16px;height:16px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center}
@keyframes gold-pulse{0%,100%{box-shadow:0 0 0 rgba(255,215,0,0)}50%{box-shadow:0 0 12px rgba(255,215,0,0.4)}}

/* ===== GRID LAYOUTS ===== */
.track-grid{display:flex;flex-direction:column;gap:4px}
.artist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.genre-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.chart-grid{display:flex;flex-direction:column;gap:2px}

/* ===== HERO CAROUSEL (#22) ===== */
.hero-carousel{position:relative;overflow:hidden;border-radius:var(--radius-xl);
  background:var(--bg-elevated);border:1px solid var(--border);margin-bottom:48px;height:320px}
.hero-slide{position:absolute;inset:0;display:flex;align-items:center;
  padding:clamp(2rem,5vw,4rem);opacity:0;transition:opacity 0.6s ease;
  background:linear-gradient(135deg,var(--bg-elevated) 40%,transparent)}
.hero-slide.active{opacity:1}
.hero-slide .hero-art{width:180px;height:180px;border-radius:var(--radius-lg);
  object-fit:cover;flex-shrink:0;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
.hero-slide .hero-info{margin-left:clamp(1.5rem,4vw,3rem)}
.hero-slide .hero-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;
  color:var(--accent);margin-bottom:8px;font-weight:700}
.hero-slide .hero-title{font-size:clamp(1.8rem,4vw,3rem);margin-bottom:4px}
.hero-slide .hero-artist{font-size:1.1rem;color:var(--text-secondary);margin-bottom:16px}
.hero-slide .hero-btn{display:inline-flex;align-items:center;gap:8px;
  padding:12px 24px;border-radius:100px;background:var(--accent);color:#fff;
  border:none;cursor:pointer;font-weight:600;font-size:0.9rem;
  transition:var(--transition);font-family:var(--font-display)}
.hero-slide .hero-btn:hover{box-shadow:var(--shadow-glow);transform:scale(1.03)}
.carousel-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px}
.carousel-dots .dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);
  cursor:pointer;transition:var(--transition)}
.carousel-dots .dot.active{background:var(--accent);width:24px;border-radius:4px}

/* ===== CHARTS (#21) ===== */
.chart-row{display:flex;align-items:center;gap:12px;padding:10px 16px;
  border-radius:var(--radius-sm);transition:var(--transition);cursor:pointer}
.chart-row:hover{background:var(--bg-surface-hover)}
.chart-row .pos{width:32px;text-align:right;font-family:var(--font-display);
  font-weight:800;font-size:1.2rem;color:var(--text-muted)}
.chart-row:nth-child(-n+3) .pos{color:var(--accent)}
.chart-row:nth-child(1) .pos{color:#ffd700;font-size:1.4rem}
.chart-row .movement{font-size:0.7rem;width:20px;text-align:center}
.chart-row .movement.up{color:var(--success)}.chart-row .movement.down{color:var(--danger)}
.chart-row .movement.new{color:var(--secondary);font-size:0.55rem;font-weight:700}

/* ===== GENRE ISLANDS MAP (#26) ===== */
.genre-map{position:relative;height:500px;background:var(--bg-elevated);border-radius:var(--radius-xl);
  border:1px solid var(--border);overflow:hidden;margin:24px 0}
.genre-island{position:absolute;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--transition-slow);z-index:1}
.genre-island:hover{z-index:10;transform:scale(1.15);box-shadow:0 0 60px var(--accent-glow)}
.genre-island .label{font-family:var(--font-display);font-weight:700;font-size:0.9rem;
  text-align:center;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
.genre-island .count{font-size:0.65rem;opacity:0.7;font-family:var(--font-mono)}
.genre-map-bg{position:absolute;inset:0;opacity:0.03;
  background:radial-gradient(circle at 30% 30%,var(--accent) 0%,transparent 50%),
             radial-gradient(circle at 70% 50%,var(--secondary) 0%,transparent 50%),
             radial-gradient(circle at 50% 80%,var(--purple) 0%,transparent 50%)}

/* ===== PLAYER BAR (#04) ===== */
#player-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(10,10,11,0.95);backdrop-filter:blur(30px) saturate(200%);
  border-top:1px solid var(--border);transition:var(--transition-slow)}
#player-bar.mini{height:var(--player-mini-h)}
#player-bar.mini .player-extras,#player-bar.mini .player-waveform,#player-bar.mini .player-progress{display:none}
#player-bar:not(.mini){height:var(--player-h);padding:12px clamp(1rem,4vw,2rem)}
#player-bar.mini{padding:8px clamp(1rem,4vw,2rem)}
.player-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:16px;height:100%}
.player-art{width:var(--player-h,56px);height:var(--player-h,56px);border-radius:var(--radius-sm);
  object-fit:cover;flex-shrink:0;transition:var(--transition-slow)}
#player-bar.mini .player-art{width:40px;height:40px}
.player-info{flex:1;min-width:0}
.player-title{font-weight:600;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-display)}
.player-artist{font-size:0.75rem;color:var(--text-secondary)}
.player-controls{display:flex;align-items:center;gap:8px}
.player-btn{width:40px;height:40px;border-radius:50%;border:none;
  background:var(--bg-surface);color:var(--text-primary);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:var(--transition);font-size:1rem}
.player-btn:hover{background:var(--bg-surface-hover)}
.player-btn.play-btn{width:48px;height:48px;background:var(--accent);color:#fff;font-size:1.2rem}
.player-btn.play-btn:hover{box-shadow:var(--shadow-glow)}
.player-progress{position:absolute;top:-2px;left:0;right:0;height:3px;background:var(--border)}
.player-progress-fill{height:100%;background:var(--accent);transition:width 0.1s linear;
  box-shadow:0 0 8px var(--accent-glow)}
.player-extras{display:flex;align-items:center;gap:8px;margin-left:auto}
.player-time{font-size:0.7rem;color:var(--text-muted);font-family:var(--font-mono);
  white-space:nowrap}
.player-waveform{width:200px;height:40px;opacity:0.3}
#player-visualizer{width:200px;height:40px}

/* ===== BLIND TASTE TEST (#28) ===== */
.blind-player{text-align:center;padding:80px 20px}
.blind-player .blur-overlay{filter:blur(40px);transition:filter 1s ease;pointer-events:none}
.blind-player .blur-overlay.revealed{filter:blur(0)}
.blind-player .reveal-btn{margin-top:32px;padding:12px 32px;border-radius:100px;
  background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:600;
  font-family:var(--font-display);font-size:1rem;transition:var(--transition)}
.blind-player .reveal-btn:hover{box-shadow:var(--shadow-glow)}
.blind-player .timer{font-family:var(--font-mono);font-size:2rem;color:var(--accent);margin:20px 0}
.blind-player .share-btn{display:inline-flex;align-items:center;gap:6px;
  padding:10px 20px;border-radius:100px;background:var(--secondary);
  color:#fff;border:none;cursor:pointer;font-weight:600;margin-top:16px;
  font-family:var(--font-display);transition:var(--transition)}
.blind-player .share-btn:hover{box-shadow:0 0 30px var(--secondary-glow)}

/* ===== TAPE DECK (#29) ===== */
.tape-deck-btn{position:relative}
.tape-deck-btn.active{background:var(--accent)!important;color:#fff!important}
.tape-deck-btn.active::after{content:'';position:absolute;inset:-2px;border-radius:50%;
  border:2px solid var(--accent);animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== LYRICS KARAOKE (#30) ===== */
.lyrics-panel{background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px;max-height:400px;overflow-y:auto;
  text-align:center;margin:16px 0}
.lyrics-panel .line{padding:6px 0;transition:var(--transition);font-size:1.1rem;color:var(--text-muted)}
.lyrics-panel .line.active{color:var(--accent);font-size:1.3rem;font-weight:600;
  text-shadow:0 0 20px var(--accent-glow)}

/* ===== APPLY GATE (#14) ===== */
.gate-page{max-width:520px;margin:80px auto;text-align:center}
.gate-page .gate-icon{font-size:4rem;margin-bottom:24px}
.gate-form{display:flex;flex-direction:column;gap:12px;margin-top:24px}
.gate-form input,.gate-form textarea{width:100%;padding:14px 18px;border-radius:var(--radius-md);
  background:var(--bg-surface);border:1px solid var(--border);color:var(--text-primary);
  font-size:0.95rem;transition:var(--transition);font-family:inherit}
.gate-form input:focus,.gate-form textarea:focus{outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-dim)}
.gate-form textarea{min-height:100px;resize:vertical}
.gate-form button{width:100%;padding:14px;border-radius:100px;background:var(--accent);
  color:#fff;border:none;cursor:pointer;font-weight:700;font-size:1rem;
  transition:var(--transition);font-family:var(--font-display)}
.gate-form button:hover{box-shadow:var(--shadow-glow)}
.invite-input{margin-top:16px;text-align:center}
.invite-input input{padding:12px 18px;border-radius:var(--radius-md);text-align:center;
  background:var(--bg-surface);border:1px solid var(--border);color:var(--text-primary);
  font-family:var(--font-mono);font-size:1.2rem;letter-spacing:0.2em;width:200px}
.invite-input input:focus{outline:none;border-color:var(--accent)}

/* ===== VIBE CHECK (#33) ===== */
.vibe-bar{display:flex;gap:8px;padding:8px 0}
.vibe-btn{padding:8px 14px;border-radius:100px;background:var(--bg-surface);
  border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;
  transition:var(--transition);font-size:0.85rem;display:flex;align-items:center;gap:4px}
.vibe-btn:hover,.vibe-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.vibe-btn .count{font-size:0.7rem;font-family:var(--font-mono)}

/* ===== SIGN TO LABEL (#34) ===== */
.sign-btn{padding:8px 16px;border-radius:100px;background:transparent;
  border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;
  transition:var(--transition);font-size:0.8rem;display:inline-flex;align-items:center;gap:6px}
.sign-btn:hover{border-color:var(--accent);color:var(--accent)}
.sign-counter{font-family:var(--font-mono);font-size:0.75rem;color:var(--accent);margin-left:8px}

/* ===== STICKER BOOK (#35) ===== */
.sticker-sidebar{position:fixed;right:16px;top:50%;transform:translateY(-50%);
  z-index:50;display:flex;flex-direction:column;gap:8px}
.sticker{width:48px;height:48px;border-radius:var(--radius-sm);cursor:grab;
  background:var(--bg-elevated);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;
  transition:var(--transition);user-select:none}
.sticker:hover{transform:scale(1.2);border-color:var(--accent);box-shadow:0 4px 20px var(--accent-glow)}
.sticker:active{cursor:grabbing}

/* ===== ACHIEVEMENT BADGES (#32) ===== */
.achievement-badge{display:inline-flex;align-items:center;gap:6px;

<!-- ===== SCRIPTS ===== -->
<script>
/* ============================================
   #01 HASH ROUTER + #02 DATA STORE
   ============================================ */
let tracksData = [], artistsData = [];
let currentRoute = '';
let audioCtx = null;
let analyserNode = null;
let tapeDeckActive = false;
let spatialActive = false;
let currentTrack = null;
let isPlaying = false;
let likedTracks = JSON.parse(localStorage.getItem('fuse_liked') || '[]');
let playHistory = JSON.parse(localStorage.getItem('fuse_history') || '[]');
let clickTimestamps = JSON.parse(sessionStorage.getItem('fuse_clicks') || '[]');
let achievements = JSON.parse(localStorage.getItem('fuse_achievements') || '[]');
let stickers = JSON.parse(localStorage.getItem('fuse_stickers') || '[]');
let vibeCounts = JSON.parse(localStorage.getItem('fuse_vibes') || '{}');
let signCounts = JSON.parse(localStorage.getItem('fuse_signs') || '{}');
let arcadeProgress = JSON.parse(localStorage.getItem('fuse_arcade') || {plays:0, uniqueArtists:[], genresPlayed:[], nightPlays:0, likedCount:0});

// SoundCloud Widget API
let scWidget = null;
let ytPlayer = null;
let scSDKLoaded = false;
let ytSDKLoaded = false;

async function loadData(){
  try{
    const [tRes, aRes] = await Promise.all([
      fetch('./data/tracks.json'), fetch('./data/artists.json')
    ]);
    tracksData = await tRes.json();
    artistsData = await aRes.json();
  }catch(e){ console.warn('Data load fallback',e); }
}

// #01 Hash Router
function navigate(path){
  window.location.hash = path;
}
window.addEventListener('hashchange',()=>{
  const hash = window.location.hash.slice(1) || '/';
  currentRoute = hash;
  renderRoute(hash);
  updateNav();
});
function updateNav(){
  document.querySelectorAll('#main-nav a').forEach(a=>{
    a.classList.toggle('active', a.dataset.route === currentRoute || 
      (currentRoute.startsWith('/station/') && a.dataset.route==='/stations') ||
      (currentRoute.startsWith('/artist/') && a.dataset.route==='/') ||
      (currentRoute.startsWith('/track/') && a.dataset.route==='/'));
  });
}

/* ============================================
   #03 HYBRID AUDIO CONTROLLER
   ============================================ */
async function playTrack(track){
  currentTrack = track;
  stopAllAudio();
  
  document.getElementById('player-title-display').textContent = track.title;
  document.getElementById('player-artist-display').textContent = track.artist;
  const artist = artistsData.find(a=>a.name===track.artist);
  document.getElementById('player-art-img').src = artist ? artist.image : 
    'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23111114"/><text x="50" y="60" text-anchor="middle" font-size="30" fill="%235c5c66">âª</text></svg>';

  // Track play count, history, achievements
  track.plays = (track.plays || 0) + 1;
  playHistory.unshift({id:track.id, title:track.title, artist:track.artist, time:Date.now()});
  if(playHistory.length > 50) playHistory = playHistory.slice(0,50);
  localStorage.setItem('fuse_history', JSON.stringify(playHistory));
  
  // #20 Hype Train tracking
  clickTimestamps.push(Date.now());
  clickTimestamps = clickTimestamps.filter(t=>Date.now()-t<60000);
  sessionStorage.setItem('fuse_clicks', JSON.stringify(clickTimestamps));
  
  // #32 Arcade tracking
  arcadeProgress.plays++;
  if(!arcadeProgress.genresPlayed.includes(track.genre)) arcadeProgress.genresPlayed.push(track.genre);
  if(!arcadeProgress.uniqueArtists.includes(track.artist)) arcadeProgress.uniqueArtists.push(track.artist);
  const hour = new Date().getHours();
  if(hour>=0 && hour<5) arcadeProgress.nightPlays++;
  localStorage.setItem('fuse_arcade', JSON.stringify(arcadeProgress));
  
  checkAchievements();

  // If phantom track (#08)
  if(!track.source_url || track.source_url === null){
    showPhantomFallback(track);
    return;
  }

  try{
    if(track.source_type === 'soundcloud'){
      await playSoundCloud(track.source_url);
    }else if(track.source_type === 'youtube'){
      await playYouTube(track.source_url);
    }else if(track.source_type === 'mixcloud'){
      await playMixcloud(track.source_url);
    }else if(track.is_local){
      playLocal(track.source_url);
    }
  }catch(e){
    // #50 Fallback chain
    if(track.source_type === 'soundcloud'){
      try{ await playSoundCloudOEmbed(track.source_url); }
      catch(e2){ showPhantomFallback(track); }
    }else{
      showPhantomFallback(track);
    }
  }

  setIsPlaying(true);
  updatePlayerBar();
  updateCurrentTrackUI();
}

function stopAllAudio(){
  if(scWidget){ try{scWidget.pause()}catch(e){} }
  if(ytPlayer){ try{ytPlayer.pauseVideo()}catch(e){} }
  const audioEl = document.getElementById('local-audio');
  if(audioEl){ audioEl.pause(); audioEl.remove(); }
  setIsPlaying(false);
}

function setIsPlaying(p){
  isPlaying = p;
  const btn = document.getElementById('player-play-btn');
  btn.textContent = p ? 'â¸' : 'â¶';
  // #47 3D album art pause
  const album3d = document.querySelector('.album-3d');
  if(album3d) album3d.classList.toggle('paused', !p);
}

// #06 SoundCloud Widget API
async function playSoundCloud(url){
  if(!scSDKLoaded){
    await new Promise((res,rej)=>{
      const s=document.createElement('script');s.src='https://w.soundcloud.com/player/api.js';
      s.onload=()=>{scSDKLoaded=true;res()};s.onerror=rej;document.head.appendChild(s);
    });
  }
  const container = document.getElementById('sc-widget-container');
  container.innerHTML = `<iframe id="sc-iframe" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&auto_play=true&buying=false&sharing=false&download=false&show_artwork=false&show_comments=false&show_playcount=false&show_user=false&hide_related=true&visual=false&color=ff6b35" width="1" height="1" frameborder="0"></iframe>`;
  
  scWidget = SC.Widget('sc-iframe');
  scWidget.bind(SC.Widget.Events.PLAY, ()=>setIsPlaying(true));
  scWidget.bind(SC.Widget.Events.PAUSE, ()=>setIsPlaying(false));
  scWidget.bind(SC.Widget.Events.FINISH, ()=>nextTrack());
  
  setupProgressPolling('sc');
}

// #07 YouTube IFrame API
async function playYouTube(url){
  const videoId = extractYouTubeID(url);
  if(!ytSDKLoaded){
    await new Promise((res,rej)=>{
      const tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';
      tag.onerror=rej;document.head.appendChild(tag);
      window.onYouTubeIframeAPIReady = ()=>{ytSDKLoaded=true;res()};
      setTimeout(()=>{if(!ytSDKLoaded){ytSDKLoaded=true;res()}},5000);
    });
  }
  if(!ytPlayer){
    ytPlayer = new YT.Player('yt-player-container', {
      height:'1',width:'1',
      videoId:videoId,
      events:{
        onReady:()=>{ytPlayer.playVideo();setIsPlaying(true);},
        onStateChange:(e)=>{
          if(e.data===YT.PlayerState.PLAYING) setIsPlaying(true);
          else if(e.data===YT.PlayerState.PAUSED) setIsPlaying(false);
          else if(e.data===YT.PlayerState.ENDED) nextTrack();
        }
      }
    });
  }else{
    ytPlayer.loadVideoById(videoId);
  }
  setupProgressPolling('yt');
}

function extractYouTubeID(url){
  const m=url.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:url;
}

// #44 Mixcloud
async function playMixcloud(url){
  document.getElementById('mx-widget-container').innerHTML = 
    `<iframe width="100%" height="60" src="https://www.mixcloud.com/widget/iframe/?feed=${encodeURIComponent(url)}&hide_cover=1&mini=1&light=1" frameborder="0"></iframe>`;
  setIsPlaying(true);
}

// #39 SoundCloud oEmbed
async function playSoundCloudOEmbed(url){
  const res=await fetch(`https://soundcloud.com/oembed?url=${encodeURIComponent(url)}&format=json`);
  const data=await res.json();
  document.getElementById('sc-widget-container').innerHTML = data.html;
  scWidget = SC.Widget(document.getElementById('sc-widget-container').querySelector('iframe'));
  scWidget.bind(SC.Widget.Events.PLAY,()=>setIsPlaying(true));
  scWidget.bind(SC.Widget.Events.PAUSE,()=>setIsPlaying(false));
}

// Local audio with Web Audio API (#10)
function playLocal(url){
  const audio=document.createElement('audio');
  audio.id='local-audio';audio.src=url;audio.crossOrigin='anonymous';
  document.body.appendChild(audio);
  
  if(!audioCtx){ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
  const source=audioCtx.createMediaElementSource(audio);
  analyserNode=audioCtx.createAnalyser();analyserNode.fftSize=256;
  source.connect(analyserNode);analyserNode.connect(audioCtx.destination);

  // #29 Tape Deck filter
  if(tapeDeckActive) applyTapeDeckFilter(source);
  // #45 Spatial audio
  if(spatialActive) applySpatialFilter(source);

  audio.play();setIsPlaying(true);
  audio.addEventListener('ended',nextTrack);
  setupProgressPolling('local',audio);
  startVisualizer();
}

// #29 Tape Deck Lo-Fi filter
function applyTapeDeckFilter(source){
  if(!audioCtx) return;
  const lowpass=audioCtx.createBiquadFilter();
  lowpass.type='lowpass';lowpass.frequency.value=4000;lowpass.Q.value=0.7;
  const wobble=audioCtx.createOscillator();
  const wobbleGain=audioCtx.createGain();
  wobble.frequency.value=0.3;wobbleGain.gain.value=8;
  wobble.connect(wobbleGain);wobbleGain.connect(lowpass.frequency);
  wobble.start();
  source.disconnect();source.connect(lowpass);lowpass.connect(audioCtx.destination);
}

// #45 Spatial audio
function applySpatialFilter(source){
  if(!audioCtx) return;
  const panner=audioCtx.createStereoPanner();
  const lfo=audioCtx.createOscillator();
  const lfoGain=audioCtx.createGain();
  lfo.frequency.value=0.2;lfoGain.gain.value=0.3;
  lfo.connect(lfoGain);lfoGain.connect(panner.pan);
  lfo.start();
  source.disconnect();source.connect(panner);panner.connect(audioCtx.destination);
}

function toggleTapeDeck(){

// #10 Web Audio Visualizer
function startVisualizer(){
  if(!analyserNode) return;
  const canvas=document.getElementById('player-visualizer');
  const ctx=canvas.getContext('2d');
  const bufferLength=analyserNode.frequencyBinCount;
  const dataArray=new Uint8Array(bufferLength);
  
  function draw(){
    if(!analyserNode) return;
    requestAnimationFrame(draw);
    analyserNode.getByteFrequencyData(dataArray);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const barW=canvas.width/bufferLength;
    for(let i=0;i<bufferLength;i++){
      const h=dataArray[i]/255*canvas.height;
      const hue=(i/bufferLength*60)+15;
      ctx.fillStyle=`hsla(${hue},100%,50%,0.7)`;
      ctx.fillRect(i*barW,canvas.height-h,barW-1,h);
    }
  }
  draw();
}

// Progress polling
function setupProgressPolling(type, audioEl){
  clearInterval(window._progressInterval);
  window._progressInterval = setInterval(()=>{
    let current=0,duration=1;
    if(type==='sc'&&scWidget){
      scWidget.getPosition(p=>current=p/1000);
      scWidget.getDuration(d=>duration=d/1000);
    }else if(type==='yt'&&ytPlayer&&ytPlayer.getCurrentTime){
      current=ytPlayer.getCurrentTime()||0;
      duration=ytPlayer.getDuration()||1;
    }else if(type==='local'&&audioEl){
      current=audioEl.currentTime;duration=audioEl.duration||1;
    }
    updateProgress(current,duration);
    // #30 Lyrics karaoke
    updateLyrics(current);
  },200);
}

function updateProgress(current,duration){
  const pct=duration>0?(current/duration)*100:0;
  document.getElementById('player-progress-fill').style.width=pct+'%';
  const cm=Math.floor(current/60),cs=Math.floor(current%60);
  const dm=Math.floor(duration/60),ds=Math.floor(duration%60);
  document.getElementById('player-time-display').textContent=
    `${cm}:${String(cs).padStart(2,'0')} / ${dm}:${String(ds).padStart(2,'0')}`;
}

function seekRelative(s){
  if(scWidget) scWidget.getPosition(p=>scWidget.seekTo((p/1000+s)*1000));
  else if(ytPlayer&&ytPlayer.seekTo) ytPlayer.seekTo((ytPlayer.getCurrentTime()||0)+s);
  else{const a=document.getElementById('local-audio');if(a)a.currentTime+=s;}
}

function togglePlay(){

  if(isPlaying){
    if(scWidget) scWidget.pause();
    else if(ytPlayer) ytPlayer.pauseVideo();
    else{const a=document.getElementById('local-audio');if(a)a.pause();}

    if(scWidget) scWidget.play();
    else if(ytPlayer) ytPlayer.playVideo();
    else{const a=document.getElementById('local-audio');if(a)a.play();}
    setIsPlaying(true);
  }
}

/* ============================================
   #34 CONFETTI
   ============================================ */
function burstConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const particles=[];
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height*-1,
      vx:(Math.random()-0.5)*6,vy:Math.random()*4+2,
      color:['#ff6b35','#4dabf7','#b388ff','#69db7c','#ffd43b'][Math.floor(Math.random()*5)],
      size:Math.random()*6+2,life:1
    });
  }
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.015;
      if(p.life>0){alive=true;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,p.size,p.size);}
    });
    ctx.globalAlpha=1;
    if(alive) requestAnimationFrame(animate);
  }
  animate();
}

/* ============================================
   #36 ARTIST TRADING CARD
   ============================================ */
function generateTradingCard(artist){
  const canvas=document.createElement('canvas');
  canvas.width=400;canvas.height=600;
  const ctx=canvas.getContext('2d');
  // Background
  const grad=ctx.createLinearGradient(0,0,400,600);
  grad.addColorStop(0,'#111114');grad.addColorStop(1,'#0a0a0b');
  ctx.fillStyle=grad;ctx.fillRect(0,0,400,600);
  // Border
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=4;
  ctx.roundRect(10,10,380,580,16);ctx.stroke();
  // Stats
  ctx.fillStyle='#e8e8ec';ctx.font='bold 28px Syne, sans-serif';
  ctx.fillText(artist.name,30,80);
  ctx.fillStyle='#ff6b35';ctx.font='14px monospace';
  ctx.fillText(artist.genre.toUpperCase(),30,105);
  ctx.fillStyle='#9a9aa3';ctx.font='13px sans-serif';
  ctx.fillText(`Plays: ${artist.plays.toLocaleString()}`,30,140);
  ctx.fillText(`Verified: ${artist.verified?'Yes â':'Pending'}`,30,165);
  if(artist.badges&&artist.badges.length){
    ctx.fillText('Badges: '+artist.badges.join(', '),30,190);
  }
  ctx.fillStyle='#5c5c66';ctx.font='11px monospace';
  ctx.fillText('FUSE MUSIC',30,560);
  ctx.fillText(`Card #${artist.id}`,300,560);

  const img = new Image();
  img.crossOrigin='anonymous';
  img.src=artist.image;
  img.onload=()=>{
    ctx.save();
    ctx.beginPath();ctx.roundRect(260,60,110,110,12);ctx.clip();
    ctx.drawImage(img,260,60,110,110);
    ctx.restore();
    downloadCard(canvas);
  };
  setTimeout(()=>downloadCard(canvas),500);
}
function downloadCard(canvas){
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='trading-card.png';
    a.click();URL.revokeObjectURL(url);
  });
}

/* ============================================
   #42 THREE.JS 3D VISUALIZER
   ============================================ */
async function initThreeJS(){
  if(!window.THREE) return;
  const container=document.getElementById('three-visualizer');
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  camera.position.z=30;
  const renderer=new THREE.WebGLRenderer({alpha:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  container.appendChild(renderer.domElement);
  
  const geometry=new THREE.SphereGeometry(10,64,64);
  const material=new THREE.MeshBasicMaterial({color:0xff6b35,wireframe:true,transparent:true,opacity:0.15});
  const sphere=new THREE.Mesh(geometry,material);
  scene.add(sphere);

  function animate(){
    requestAnimationFrame(animate);
    sphere.rotation.x+=0.002;sphere.rotation.y+=0.003;
    if(analyserNode){
      const data=new Uint8Array(analyserNode.frequencyBinCount);
      analyserNode.getByteFrequencyData(data);
      const avg=data.reduce((a,b)=>a+b,0)/data.length;
      sphere.scale.setScalar(1+avg/512);
    }
    renderer.render(scene,camera);
  }
  animate();
  container.classList.add('active');
}

// Carousel (#22)
function initCarousel(){
  const slides=document.querySelectorAll('.hero-slide');
  const dots=document.querySelectorAll('.carousel-dots .dot');
  let current=0;
  function goTo(i){
    slides.forEach(s=>s.classList.remove('active'));
    dots.forEach(d=>d.classList.remove('active'));
    slides[i].classList.add('active');
    dots[i].classList.add('active');
    current=i;
  }
  window.slideCarousel=goTo;
  setInterval(()=>{goTo((current+1)%slides.length)},5000);
}
